<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #030710; overflow: hidden; }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <rect width="800" height="400" fill="#030710"/>
  <text x="400" y="38" text-anchor="middle" font-size="22" font-weight="300" fill="#F2FAFF">Declaring servers in .mcp.json</text>
  <text x="400" y="62" text-anchor="middle" font-size="12.5" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">deepagents auto-discovers this file at the project root</text>

  <!-- Editor box: left-aligned to leave room for annotation panel -->
  <rect x="24" y="82" width="440" height="244" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="1.5"/>
  <rect x="24" y="82" width="440" height="28" rx="8" fill="#161F34"/>
  <rect x="24" y="98" width="440" height="12" fill="#161F34"/>
  <circle cx="42" cy="96" r="5" fill="#441E33"/>
  <circle cx="59" cy="96" r="5" fill="#634643"/>
  <circle cx="76" cy="96" r="5" fill="#2E3900"/>
  <text x="92" y="100" font-size="10" fill="#40668D" font-family="'IBM Plex Mono',monospace">.mcp.json</text>

  <g font-family="'IBM Plex Mono',monospace" font-size="13">
    <rect x="32" y="142" width="432" height="21" rx="3" fill="#0D1A2E" stroke="#40668D" stroke-width="1"/>
    <rect x="32" y="165" width="432" height="21" rx="3" fill="#1A2E1A" stroke="#6E8900" stroke-width="1"/>
    <rect x="32" y="188" width="432" height="21" rx="3" fill="#0D1525" stroke="#7FC8FF" stroke-width="1"/>
    <text x="44" y="134" fill="#7FC8FF">{"mcpServers": {</text>
    <text x="44" y="157" fill="#B2DEFF">  "docs-langchain": {</text>
    <text x="44" y="180" fill="#B2DEFF">    "type": <tspan fill="#E3FF8F">"http"</tspan>,</text>
    <text x="44" y="203" fill="#B2DEFF">    "url":  <tspan fill="#E3FF8F">"https://docs.langchain.com/mcp"</tspan></text>
    <text x="44" y="226" fill="#40668D">  }</text>
    <text x="44" y="249" fill="#7FC8FF">}}</text>
  </g>

  <!-- Connector: server name -->
  <line x1="464" y1="157" x2="488" y2="162" stroke="#40668D" stroke-width="1.2"/>

  <!-- Annotation 1: server name -->
  <rect x="490" y="130" width="280" height="66" rx="6" fill="#0D1322" stroke="#40668D" stroke-width="1.5"/>
  <text x="503" y="154" font-size="13" font-weight="500" fill="#B2DEFF">SERVER NAME</text>
  <text x="503" y="173" font-size="12" fill="#7FC8FF">any key you choose; identifies this</text>
  <text x="503" y="188" font-size="12" fill="#7FC8FF">server in logs and error messages</text>

  <!-- Connector: transport type -->
  <line x1="464" y1="180" x2="488" y2="222" stroke="#6E8900" stroke-width="1.2"/>

  <!-- Annotation 2: transport type -->
  <rect x="490" y="206" width="280" height="66" rx="6" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
  <text x="503" y="230" font-size="13" font-weight="500" fill="#E3FF8F">TRANSPORT TYPE</text>
  <text x="503" y="249" font-size="12" fill="#B2DEFF">http for remote servers,</text>
  <text x="503" y="264" font-size="12" fill="#B2DEFF">stdio for local command-line servers</text>

  <!-- Connector: server URL -->
  <line x1="464" y1="203" x2="488" y2="298" stroke="#7FC8FF" stroke-width="1.2"/>

  <!-- Annotation 3: server URL (extends just below editor bottom - right side has space) -->
  <rect x="490" y="282" width="280" height="58" rx="6" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.5"/>
  <text x="503" y="306" font-size="13" font-weight="500" fill="#7FC8FF">SERVER URL</text>
  <text x="503" y="325" font-size="12" fill="#B2DEFF">the endpoint deepagents connects to</text>

  <!-- Footer -->
  <text x="400" y="375" text-anchor="middle" font-size="13" fill="#B2DEFF">Add a server entry and deepagents will connect to it automatically on the next run.</text>
</svg>
</body>
</html>
