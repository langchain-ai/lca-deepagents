<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../shared/sd-components.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #030710; overflow: hidden; }
  .sd-caption { min-height: unset !important; }
  .slide { display: none; }
  .slide.active { display: block; }
  .slide svg { width: 100%; height: auto; display: block; }
  .sd-stage { position: relative; cursor: pointer; }
</style>
</head>
<body>

    <div id="slides">

          <text x="400" y="221" text-anchor="middle" font-size="10" fill="#40668D" font-family="'IBM Plex Mono',monospace">no custom code in your agent</text>
          <line x1="514" y1="179" x2="582" y2="179" stroke="#7FC8FF" stroke-width="2" marker-end="url(#s3fa)"/>

          <rect x="200" y="100" width="400" height="210" rx="12" fill="#0D1322" stroke="#40668D" stroke-width="2"/>

          <text x="400" y="348" text-anchor="middle" font-size="12.5" fill="#B2DEFF">When you connect to an MCP server, deepagents discovers all its</text>

          <defs><marker id="s5a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#7FC8FF"/></marker></defs>

          <text x="400" y="74" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">the agent cannot tell them apart from locally-defined tools</text>
          <rect x="36" y="110" width="190" height="160" rx="10" fill="#0D1322" stroke="#40668D" stroke-width="1.5"/>
          <text x="131" y="138" text-anchor="middle" font-size="13" font-weight="400" fill="#B2DEFF">MCP Server</text>
          <rect x="54" y="150" width="154" height="28" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1"/>
          <text x="131" y="168" text-anchor="middle" font-size="11" fill="#CCE9FF" font-family="'IBM Plex Mono',monospace">list_emails</text>
          <rect x="54" y="186" width="154" height="28" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1"/>
          <text x="131" y="204" text-anchor="middle" font-size="11" fill="#CCE9FF" font-family="'IBM Plex Mono',monospace">read_email</text>
          <rect x="54" y="222" width="154" height="28" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1"/>
          <text x="131" y="240" text-anchor="middle" font-size="11" fill="#CCE9FF" font-family="'IBM Plex Mono',monospace">search_emails</text>
          <line x1="226" y1="190" x2="278" y2="190" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#s5a)"/>
          <rect x="280" y="158" width="156" height="64" rx="8" fill="#161F34" stroke="#2F4B68" stroke-width="1.2"/>

          <text x="358" y="198" text-anchor="middle" font-size="10" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">adapters</text>
          <text x="358" y="214" text-anchor="middle" font-size="9.5" fill="#40668D">wraps as BaseTool</text>
          <line x1="436" y1="190" x2="488" y2="190" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#s5a)"/>

          <rect x="508" y="160" width="238" height="28" rx="5" fill="#161F34" stroke="#6E8900" stroke-width="1.2"/>
          <text x="614" y="178" text-anchor="middle" font-size="11" fill="#E3FF8F" font-family="'IBM Plex Mono',monospace">web_search</text>
          <text x="706" y="178" font-size="9" fill="#6E8900">local</text>
          <rect x="508" y="196" width="238" height="28" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1.2"/>
          <text x="614" y="214" text-anchor="middle" font-size="11" fill="#CCE9FF" font-family="'IBM Plex Mono',monospace">list_emails</text>
          <text x="706" y="214" font-size="9" fill="#40668D">MCP</text>
          <rect x="508" y="232" width="238" height="28" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1.2"/>

          <text x="400" y="356" text-anchor="middle" font-size="12.5" fill="#B2DEFF">The model decides what to do next exactly as it would with any other tool.</text>
        </svg>
      </div>

    </div><!-- #slides -->

  </div><!-- .sd-stage -->

  <div class="sd-bar">
    <div class="sd-caption">
      <strong id="tag">Click → to begin</strong>
      <span id="cap">Step through the MCP overview one diagram at a time.</span>
    </div>
    <div class="sd-controls">
      <button class="sd-btn" id="prev" disabled title="Previous">&#8592;</button>
      <button class="sd-btn" id="next" title="Next">&#8594;</button>
    </div>
  </div>

  <div class="sd-dots" id="dots"></div>

</div><!-- .sd-wrap -->

<script>
(function () {
  var STEPS = [
    { tag: 'MCP: one standard interface',
      cap: 'MCP replaces the one-integration-per-service pattern with a single standard protocol. Any MCP-aware client connects to any MCP server, regardless of the underlying service.' },
    { tag: 'MCP: one standard interface',
      cap: 'The MCP server handles service-specific details. Your agent only speaks MCP. Adding a new service means pointing at a new server; no changes to agent code.' },
    { tag: 'What an MCP server exposes',
      cap: 'Servers expose tools (callable functions) and resources (structured data to read). Tools are the focus of this course; deepagents discovers them automatically when you connect.' },
    { tag: 'MCP tools as BaseTool objects',
      cap: 'langchain-mcp-adapters wraps each server tool as a standard BaseTool. The agent sees MCP tools identically to locally-defined tools; results come back as ToolMessages in the conversation history.' }
  ];

  var slides = document.querySelectorAll('#slides .slide');
  var dotsEl = document.getElementById('dots');
  var tagEl  = document.getElementById('tag');
  var capEl  = document.getElementById('cap');
  var prevBtn = document.getElementById('prev');
  var nextBtn = document.getElementById('next');
  var stage  = document.getElementById('stage');
  var cur = 0;

  slides.forEach(function (_, i) {
    var d = document.createElement('div');
    d.className = 'sd-dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', function () { goTo(i); });
    dotsEl.appendChild(d);
  });

  function goTo(n) {
    if (n < 0 || n >= slides.length) return;
    slides[cur].classList.remove('active');
    dotsEl.children[cur].classList.remove('active');
    cur = n;
    slides[cur].classList.add('active');
    dotsEl.children[cur].classList.add('active');
    tagEl.textContent = STEPS[cur].tag;
    capEl.textContent = STEPS[cur].cap;
    prevBtn.disabled = cur === 0;
    nextBtn.disabled = cur === slides.length - 1;
  }

  stage.addEventListener('click', function () {
    if (cur < slides.length - 1) goTo(cur + 1);
  });

  prevBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    if (cur > 0) goTo(cur - 1);
  });

  nextBtn.addEventListener('click', function (e) {
    e.stopPropagation();
    if (cur < slides.length - 1) goTo(cur + 1);
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight') { if (cur < slides.length - 1) goTo(cur + 1); }
    if (e.key === 'ArrowLeft')  { if (cur > 0) goTo(cur - 1); }
  });
})();
</script>
</body>
</html>
