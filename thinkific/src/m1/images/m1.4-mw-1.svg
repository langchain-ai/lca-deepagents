<svg width="740" height="430" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="mw1-arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7FC8FF"/></marker>
    <marker id="mw1-loop" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5BADDF"/></marker>
  </defs>
  <rect width="740" height="430" fill="#030710" rx="8"/>
  <text x="370" y="40" text-anchor="middle" font-size="15" font-weight="300" fill="#F2FAFF">Where middleware runs</text>
  <text x="370" y="60" text-anchor="middle" font-size="11" fill="#99D3FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Fixed hook points in the agent loop; the SDK installs the required ones</text>

  <!-- faded echo cards (earlier turns) -->
  <rect x="138" y="148" width="432" height="56" rx="8" fill="#1E3A5F" stroke="#2F4B68" stroke-width="1" opacity="0.3"/>
  <rect x="146" y="156" width="432" height="56" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="1" opacity="0.5"/>
  <text x="556" y="143" text-anchor="middle" font-size="8" fill="#2F4B68" opacity="0.8">…earlier turns</text>

  <!-- boxes -->
  <rect x="42"  y="164" width="96" height="56" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1"/>
  <text x="90"  y="196" text-anchor="middle" font-size="9.5" font-weight="400" fill="#B2DEFF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">before_agent</text>

  <rect x="154" y="164" width="96" height="56" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1"/>
  <text x="202" y="196" text-anchor="middle" font-size="9.5" font-weight="400" fill="#B2DEFF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">before_model</text>

  <rect x="266" y="164" width="96" height="56" rx="5" fill="#161F34" stroke="#7FC8FF" stroke-width="2"/>
  <text x="314" y="197" text-anchor="middle" font-size="12" font-weight="400" fill="#F2FAFF">MODEL</text>

  <rect x="378" y="164" width="96" height="56" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1"/>
  <text x="426" y="196" text-anchor="middle" font-size="9.5" font-weight="400" fill="#B2DEFF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">after_model</text>

  <rect x="490" y="164" width="96" height="56" rx="5" fill="#161F34" stroke="#C78EAD" stroke-width="1"/>
  <text x="538" y="192" text-anchor="middle" font-size="9.5" font-weight="400" fill="#C78EAD" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">tool call</text>
  <text x="538" y="207" text-anchor="middle" font-size="7.5" fill="#EBD0F0" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">wrap_tool_call</text>

  <rect x="602" y="164" width="96" height="56" rx="5" fill="#161F34" stroke="#40668D" stroke-width="1"/>
  <text x="650" y="196" text-anchor="middle" font-size="9.5" font-weight="400" fill="#B2DEFF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">after_agent</text>

  <!-- linear flow arrows -->
  <line x1="140" y1="192" x2="152" y2="192" stroke="#40668D" stroke-width="1.3" marker-end="url(#mw1-arr)"/>
  <line x1="252" y1="192" x2="264" y2="192" stroke="#40668D" stroke-width="1.3" marker-end="url(#mw1-arr)"/>
  <line x1="364" y1="192" x2="376" y2="192" stroke="#40668D" stroke-width="1.3" marker-end="url(#mw1-arr)"/>
  <line x1="476" y1="192" x2="488" y2="192" stroke="#40668D" stroke-width="1.3" marker-end="url(#mw1-arr)"/>
  <line x1="588" y1="192" x2="600" y2="192" stroke="#40668D" stroke-width="1.3" marker-end="url(#mw1-arr)"/>

  <text x="90"  y="240" text-anchor="middle" font-size="8.5" fill="#5BADDF">once at start</text>
  <text x="650" y="240" text-anchor="middle" font-size="8.5" fill="#5BADDF">once at end</text>

  <!-- loop-back arrow -->
  <path d="M594 220 L594 254 L148 254 L148 222" fill="none" stroke="#40668D" stroke-width="1.6" stroke-linejoin="round" stroke-dasharray="6,4" marker-end="url(#mw1-loop)"/>
  <text x="371" y="272" text-anchor="middle" font-size="10.5" fill="#5BADDF">↻  the model + tools cycle repeats each turn, until the task is done</text>

  <!-- footer note -->
  <rect x="120" y="300" width="500" height="74" rx="6" fill="#0D1322" stroke="#2F4B68" stroke-width="1.2"/>
  <text x="370" y="326" text-anchor="middle" font-size="11" fill="#B2DEFF">At any of these points a middleware can read or rewrite the request,</text>
  <text x="370" y="344" text-anchor="middle" font-size="11" fill="#B2DEFF">add tools, change the agent's state, or pause the run.</text>
  <text x="370" y="364" text-anchor="middle" font-size="9.5" fill="#40668D" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">You don't wire them up; create_deep_agent installs the required ones.</text>
</svg>
