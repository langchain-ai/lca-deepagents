<svg width="800" height="505" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="800" height="505" fill="#030710" rx="8"/>

  <text x="390" y="32" text-anchor="middle" font-size="15" font-weight="300" fill="#F2FAFF">Anatomy of a tool()</text>
  <text x="390" y="52" text-anchor="middle" font-size="11" fill="#99D3FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Three things the model reads when deciding whether and how to call a tool</text>

  <!-- editor window -->
  <rect x="36" y="65" width="320" height="380" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="1.5"/>
  <rect x="36" y="65" width="320" height="26" rx="8" fill="#1E3A5F"/>
  <rect x="36" y="83" width="320" height="8" fill="#1E3A5F"/>
  <circle cx="52" cy="78" r="4" fill="#441E33"/>
  <circle cx="66" cy="78" r="4" fill="#634643"/>
  <circle cx="80" cy="78" r="4" fill="#2E3900"/>
  <text x="96" y="82" font-size="9" fill="#99D3FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">agent.ts</text>

  <!-- highlight rects -->
  <rect x="40" y="133" width="312" height="22" rx="3" fill="#2E3900" stroke="#6E8900" stroke-width="1.5"/>
  <rect x="40" y="283" width="312" height="22" rx="3" fill="#0D1F3A" stroke="#006DDD" stroke-width="1.5"/>
  <rect x="40" y="313" width="312" height="22" rx="3" fill="#2A1A2E" stroke="#C78EAD" stroke-width="1.5"/>
  <rect x="40" y="343" width="312" height="22" rx="3" fill="#0D1F3A" stroke="#006DDD" stroke-width="1.5"/>

  <!-- code -->
  <g font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" xml:space="preserve">
    <text x="64" y="118" fill="#40668D">import { tool } from "langchain";</text>
    <text x="64" y="148" fill="#E3FF8F" font-weight="400">const getStockPrice = tool(</text>
    <text x="64" y="178" fill="#40668D">  ({ ticker }) =&gt; {</text>
    <text x="64" y="208" fill="#40668D">    ...  // your implementation</text>
    <text x="64" y="238" fill="#40668D">  },</text>
    <text x="64" y="268" fill="#40668D">  {</text>
    <text x="64" y="298" fill="#7FC8FF" font-weight="400">    name: "get_stock_price",</text>
    <text x="64" y="328" fill="#C78EAD" font-weight="400">    description: "Describe the tool...",</text>
    <text x="64" y="358" fill="#7FC8FF" font-weight="400">    schema: z.object({ticker: z.string()})</text>
    <text x="64" y="388" fill="#40668D">  }</text>
    <text x="64" y="418" fill="#40668D">);</text>
  </g>

  <!-- connectors from code lines to annotation boxes -->
  <line x1="352" y1="144" x2="372" y2="150" stroke="#6E8900" stroke-width="1.5"/>
  <line x1="352" y1="294" x2="372" y2="242" stroke="#006DDD" stroke-width="1.5"/>
  <line x1="352" y1="324" x2="372" y2="317" stroke="#C78EAD" stroke-width="1.5"/>
  <line x1="352" y1="354" x2="372" y2="260" stroke="#006DDD" stroke-width="1.5"/>

  <!-- annotation box: wrapper -->
  <rect x="372" y="130" width="408" height="62" rx="6" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
  <text x="383" y="149" font-size="13" font-weight="400" fill="#E3FF8F">THE tool() WRAPPER</text>
  <text x="383" y="168" font-size="12" fill="#B2DEFF">wraps the function and registers it as a LangChain tool</text>

  <!-- annotation box: name & schema -->
  <rect x="372" y="204" width="408" height="82" rx="6" fill="#0D1322" stroke="#006DDD" stroke-width="1.5"/>
  <text x="383" y="223" font-size="13" font-weight="400" fill="#7FC8FF">THE NAME &amp; SCHEMA</text>
  <text x="383" y="242" font-size="12" fill="#40668D">name</text>
  <text x="420" y="242" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#CCE9FF">get_stock_price</text>
  <text x="383" y="260" font-size="12" fill="#40668D">schema</text>
  <text x="430" y="260" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#CCE9FF">ticker: z.string()</text>

  <!-- annotation box: description -->
  <rect x="372" y="298" width="408" height="82" rx="6" fill="#0D1322" stroke="#C78EAD" stroke-width="1.5"/>
  <text x="383" y="317" font-size="13" font-weight="400" fill="#C78EAD">THE DESCRIPTION</text>
  <text x="383" y="336" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#C78EAD">"Return the latest closing price..."</text>
  <text x="383" y="354" font-size="12" fill="#B2DEFF">the only signal for when to call the tool</text>

  <!-- footer -->
  <text x="400" y="470" text-anchor="middle" font-size="10" fill="#CCE9FF">The description is the most important: it is the only signal the model has for deciding when to reach for this tool.</text>
  <text x="400" y="488" text-anchor="middle" font-size="9" fill="#40668D" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Write it as a clear, specific sentence describing what the tool does and when to use it.</text>
</svg>
