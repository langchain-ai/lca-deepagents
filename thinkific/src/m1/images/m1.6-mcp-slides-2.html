<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #030710; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  .slide { display: none; }
  .slide.active { display: block; }
  .slide svg { width: 100%; height: auto; display: block; }
  .controls { display: flex; align-items: center; justify-content: space-between; padding: 13px 28px; background: #0D1322; border-top: 1px solid #161F34; }
  .btn { font: 500 12px 'IBM Plex Mono', monospace; padding: 7px 18px; border: 1px solid #40668D; background: transparent; color: #7FC8FF; border-radius: 6px; cursor: pointer; transition: background .15s; }
  .btn:hover { background: #161F34; }
  .btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  .dots { display: flex; gap: 10px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #2F4B68; cursor: pointer; transition: background .2s, transform .2s; }
  .dot.active { background: #7FC8FF; transform: scale(1.25); }
  .slide-label { font: 400 11px 'IBM Plex Mono', monospace; color: #40668D; min-width: 40px; text-align: right; }
</style>
</head>
<body>
<div id="slides">

  <!-- SLIDE 1: Overview -->
  <div class="slide active">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs><marker id="t1a" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#7FC8FF"/></marker></defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="48" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">What is transport?</text>
      <text x="400" y="74" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">the layer that carries messages between your agent and the MCP server</text>

      <rect x="80" y="148" width="180" height="84" rx="10" fill="#0D1322" stroke="#7FC8FF" stroke-width="2"/>
      <text x="170" y="186" text-anchor="middle" font-size="14" font-weight="400" fill="#7FC8FF">Your Agent</text>
      <text x="170" y="208" text-anchor="middle" font-size="10" fill="#B2DEFF">calls a tool</text>

      <rect x="310" y="158" width="180" height="64" rx="10" fill="#161F34" stroke="#40668D" stroke-width="1.5"/>
      <text x="400" y="187" text-anchor="middle" font-size="13" fill="#B2DEFF">Transport</text>
      <text x="400" y="207" text-anchor="middle" font-size="10" fill="#40668D" font-family="'IBM Plex Mono',monospace">stdio / HTTP / SSE</text>

      <rect x="540" y="148" width="180" height="84" rx="10" fill="#0D1322" stroke="#40668D" stroke-width="2"/>
      <text x="630" y="186" text-anchor="middle" font-size="14" font-weight="400" fill="#B2DEFF">MCP Server</text>
      <text x="630" y="206" text-anchor="middle" font-size="10" fill="#5BADDF">runs the tool</text>

      <line x1="260" y1="190" x2="308" y2="190" stroke="#7FC8FF" stroke-width="2" marker-end="url(#t1a)"/>
      <line x1="490" y1="190" x2="538" y2="190" stroke="#7FC8FF" stroke-width="2" marker-end="url(#t1a)"/>

      <text x="400" y="290" text-anchor="middle" font-size="13" fill="#B2DEFF">Transport is set once in .mcp.json.</text>
      <text x="400" y="312" text-anchor="middle" font-size="13" fill="#B2DEFF">Your agent code stays identical regardless of which type is used.</text>
      <text x="400" y="352" text-anchor="middle" font-size="11.5" fill="#40668D">The next slides explain what each type is and when you would use it.</text>
    </svg>
  </div>

  <!-- SLIDE 2: stdio - what is it? -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="44" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">stdio: standard input and output</text>
      <text x="400" y="70" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">every command-line program already has these</text>

      <!-- stdin explanation -->
      <rect x="60" y="100" width="300" height="96" rx="8" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.5"/>
      <text x="210" y="128" text-anchor="middle" font-size="13" font-weight="400" fill="#7FC8FF">stdin</text>
      <text x="210" y="152" text-anchor="middle" font-size="12" fill="#B2DEFF">The program's input stream.</text>
      <text x="210" y="172" text-anchor="middle" font-size="12" fill="#B2DEFF">Another process writes to it</text>
      <text x="210" y="186" text-anchor="middle" font-size="12" fill="#B2DEFF">to send a message.</text>

      <!-- stdout explanation -->
      <rect x="440" y="100" width="300" height="96" rx="8" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
      <text x="590" y="128" text-anchor="middle" font-size="13" font-weight="400" fill="#E3FF8F">stdout</text>
      <text x="590" y="152" text-anchor="middle" font-size="12" fill="#B2DEFF">The program's output stream.</text>
      <text x="590" y="172" text-anchor="middle" font-size="12" fill="#B2DEFF">The program writes its response</text>
      <text x="590" y="186" text-anchor="middle" font-size="12" fill="#B2DEFF">here for others to read.</text>

      <!-- Analogy -->
      <rect x="120" y="222" width="560" height="84" rx="8" fill="#161F34" stroke="#2F4B68" stroke-width="1"/>
      <text x="400" y="248" text-anchor="middle" font-size="12" fill="#40668D">Think of it like two programs passing notes through a pipe.</text>
      <text x="400" y="270" text-anchor="middle" font-size="13" fill="#B2DEFF">Program A writes a line to Program B's stdin.</text>
      <text x="400" y="292" text-anchor="middle" font-size="13" fill="#B2DEFF">Program B processes it and writes a reply to stdout.</text>

      <text x="400" y="350" text-anchor="middle" font-size="11.5" fill="#40668D">No network, no URLs, no ports; just two processes on the same machine talking over text streams.</text>
    </svg>
  </div>

  <!-- SLIDE 3: stdio for MCP -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs>
        <marker id="t3f" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#7FC8FF"/></marker>
        <marker id="t3b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#E3FF8F"/></marker>
      </defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="44" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">stdio for MCP</text>
      <text x="400" y="70" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">the MCP server is the subprocess; deepagents is the other process</text>

      <!-- Your machine boundary -->
      <rect x="30" y="90" width="740" height="160" rx="12" fill="#0D1322" stroke="#2F4B68" stroke-width="1.5" stroke-dasharray="6,4"/>
      <text x="400" y="112" text-anchor="middle" font-size="10" fill="#2F4B68" font-family="'IBM Plex Mono',monospace">your machine; no internet required</text>

      <!-- deepagents -->
      <rect x="60" y="124" width="220" height="96" rx="8" fill="#161F34" stroke="#7FC8FF" stroke-width="1.5"/>
      <text x="170" y="158" text-anchor="middle" font-size="13" fill="#7FC8FF">deepagents</text>
      <text x="170" y="178" text-anchor="middle" font-size="10.5" fill="#B2DEFF">writes tool call to stdin</text>
      <text x="170" y="198" text-anchor="middle" font-size="10.5" fill="#B2DEFF">reads result from stdout</text>

      <!-- stdin/stdout arrows -->
      <line x1="280" y1="158" x2="440" y2="158" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#t3f)"/>
      <text x="360" y="150" text-anchor="middle" font-size="10" fill="#7FC8FF" font-family="'IBM Plex Mono',monospace">stdin</text>
      <line x1="440" y1="188" x2="280" y2="188" stroke="#E3FF8F" stroke-width="1.5" marker-end="url(#t3b)"/>
      <text x="360" y="204" text-anchor="middle" font-size="10" fill="#6E8900" font-family="'IBM Plex Mono',monospace">stdout</text>

      <!-- MCP server subprocess -->
      <rect x="442" y="124" width="296" height="96" rx="8" fill="#161F34" stroke="#40668D" stroke-width="1.5"/>
      <text x="590" y="154" text-anchor="middle" font-size="13" fill="#B2DEFF">MCP Server (subprocess)</text>
      <text x="590" y="176" text-anchor="middle" font-size="10.5" fill="#5BADDF">started by deepagents on launch</text>
      <text x="590" y="196" text-anchor="middle" font-size="10.5" fill="#5BADDF">exits when your script finishes</text>

      <!-- Config -->
      <rect x="160" y="278" width="480" height="44" rx="6" fill="#161F34" stroke="#2F4B68" stroke-width="1"/>
      <text x="400" y="296" text-anchor="middle" font-size="10.5" fill="#40668D" font-family="'IBM Plex Mono',monospace">.mcp.json: use "command" instead of "type":</text>
      <text x="400" y="314" text-anchor="middle" font-size="11.5" fill="#E3FF8F" font-family="'IBM Plex Mono',monospace">"command": "npx",  "args": ["-y", "some-mcp-server"]</text>

      <text x="400" y="358" text-anchor="middle" font-size="11.5" fill="#40668D">Good for local tools, offline use, or bundling a server alongside your project.</text>
    </svg>
  </div>

  <!-- SLIDE 4: HTTP - what is it? -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs>
        <marker id="t4f" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#7FC8FF"/></marker>
        <marker id="t4b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#B2DEFF"/></marker>
      </defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="44" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">HTTP: the protocol that powers the web</text>
      <text x="400" y="70" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">ask a question, get an answer, connection closes</text>

      <!-- Client -->
      <rect x="60" y="130" width="200" height="90" rx="8" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.5"/>
      <text x="160" y="162" text-anchor="middle" font-size="13" fill="#7FC8FF">Client</text>
      <text x="160" y="184" text-anchor="middle" font-size="11" fill="#B2DEFF">sends a request</text>
      <text x="160" y="202" text-anchor="middle" font-size="10" fill="#40668D">e.g. your browser</text>

      <!-- Request arrow -->
      <line x1="260" y1="162" x2="440" y2="162" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#t4f)"/>
      <text x="350" y="153" text-anchor="middle" font-size="10.5" fill="#7FC8FF" font-family="'IBM Plex Mono',monospace">GET / POST</text>

      <!-- Response arrow -->
      <line x1="440" y1="192" x2="260" y2="192" stroke="#B2DEFF" stroke-width="1.5" marker-end="url(#t4b)"/>
      <text x="350" y="212" text-anchor="middle" font-size="10.5" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">response body</text>

      <!-- Server -->
      <rect x="442" y="130" width="200" height="90" rx="8" fill="#0D1322" stroke="#40668D" stroke-width="1.5"/>
      <text x="542" y="162" text-anchor="middle" font-size="13" fill="#B2DEFF">Server</text>
      <text x="542" y="184" text-anchor="middle" font-size="11" fill="#5BADDF">processes request</text>
      <text x="542" y="202" text-anchor="middle" font-size="11" fill="#5BADDF">sends response</text>

      <!-- Connection closes note -->
      <rect x="240" y="248" width="320" height="32" rx="6" fill="#161F34" stroke="#634643" stroke-width="1"/>
      <text x="400" y="269" text-anchor="middle" font-size="12" fill="#FBB0A5">Connection closes after each exchange.</text>

      <text x="400" y="330" text-anchor="middle" font-size="12.5" fill="#B2DEFF">HTTP is stateless: the server treats each request as independent.</text>
      <text x="400" y="352" text-anchor="middle" font-size="12.5" fill="#B2DEFF">There is no memory of previous requests unless the client sends context.</text>
    </svg>
  </div>

  <!-- SLIDE 5: HTTP for MCP -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs>
        <marker id="t5f" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#7FC8FF"/></marker>
        <marker id="t5b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#B2DEFF"/></marker>
      </defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="44" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">HTTP for MCP</text>
      <text x="400" y="70" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">each tool call is one HTTP request to a remote server</text>

      <!-- Agent -->
      <rect x="60" y="124" width="200" height="112" rx="8" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.5"/>
      <text x="160" y="156" text-anchor="middle" font-size="13" fill="#7FC8FF">Agent</text>
      <text x="160" y="178" text-anchor="middle" font-size="11" fill="#B2DEFF">calls a tool →</text>
      <text x="160" y="196" text-anchor="middle" font-size="11" fill="#B2DEFF">deepagents sends</text>
      <text x="160" y="214" text-anchor="middle" font-size="11" fill="#B2DEFF">an HTTP POST</text>

      <!-- Internet -->
      <rect x="296" y="150" width="208" height="60" rx="28" fill="#161F34" stroke="#2F4B68" stroke-width="1.2"/>
      <text x="400" y="178" text-anchor="middle" font-size="11" fill="#5BADDF">internet</text>
      <text x="400" y="196" text-anchor="middle" font-size="10" fill="#40668D" font-family="'IBM Plex Mono',monospace">HTTPS</text>

      <line x1="260" y1="165" x2="294" y2="165" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#t5f)"/>
      <text x="277" y="157" text-anchor="middle" font-size="9.5" fill="#7FC8FF" font-family="'IBM Plex Mono',monospace">POST</text>
      <line x1="504" y1="195" x2="540" y2="195" stroke="#B2DEFF" stroke-width="1.5" marker-end="url(#t5f)"/>
      <line x1="294" y1="195" x2="260" y2="195" stroke="#B2DEFF" stroke-width="1.5" marker-end="url(#t5b)"/>
      <text x="277" y="210" text-anchor="middle" font-size="9.5" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">result</text>

      <!-- MCP Server -->
      <rect x="542" y="124" width="200" height="112" rx="8" fill="#0D1322" stroke="#40668D" stroke-width="1.5"/>
      <text x="642" y="156" text-anchor="middle" font-size="13" fill="#B2DEFF">MCP Server</text>
      <text x="642" y="178" text-anchor="middle" font-size="11" fill="#5BADDF">hosted remotely</text>
      <text x="642" y="198" text-anchor="middle" font-size="11" fill="#5BADDF">runs the tool</text>
      <text x="642" y="218" text-anchor="middle" font-size="11" fill="#5BADDF">sends result back</text>

      <!-- Config -->
      <rect x="160" y="268" width="480" height="44" rx="6" fill="#161F34" stroke="#2F4B68" stroke-width="1"/>
      <text x="400" y="286" text-anchor="middle" font-size="10.5" fill="#40668D" font-family="'IBM Plex Mono',monospace">.mcp.json:</text>
      <text x="400" y="304" text-anchor="middle" font-size="11.5" fill="#E3FF8F" font-family="'IBM Plex Mono',monospace">"type": "http",  "url": "https://docs.langchain.com/mcp"</text>

      <text x="400" y="360" text-anchor="middle" font-size="11.5" fill="#40668D">Good for remote servers where results arrive as a single complete response.</text>
    </svg>
  </div>

  <!-- SLIDE 6: SSE - what is it? -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs>
        <marker id="t6f" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#7FC8FF"/></marker>
        <marker id="t6s" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#E3FF8F"/></marker>
        <marker id="t6b" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#B2DEFF"/></marker>
      </defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="44" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">SSE: Server-Sent Events</text>
      <text x="400" y="70" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">HTTP, but the connection stays open</text>

      <!-- HTTP comparison (top) -->
      <text x="200" y="106" text-anchor="middle" font-size="11" fill="#40668D" font-family="'IBM Plex Mono',monospace">regular HTTP</text>
      <rect x="60" y="116" width="100" height="42" rx="6" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
      <text x="110" y="142" text-anchor="middle" font-size="10" fill="#B2DEFF">client</text>
      <line x1="160" y1="132" x2="220" y2="132" stroke="#7FC8FF" stroke-width="1.3" marker-end="url(#t6f)"/>
      <line x1="220" y1="148" x2="160" y2="148" stroke="#B2DEFF" stroke-width="1.3" marker-end="url(#t6b)"/>
      <rect x="222" y="116" width="100" height="42" rx="6" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
      <text x="272" y="142" text-anchor="middle" font-size="10" fill="#B2DEFF">server</text>
      <!-- closed note -->
      <rect x="334" y="124" width="94" height="26" rx="4" fill="#161F34" stroke="#634643" stroke-width="1"/>
      <text x="381" y="141" text-anchor="middle" font-size="9.5" fill="#FBB0A5">closes ✕</text>

      <!-- SSE comparison (below) -->
      <text x="200" y="188" text-anchor="middle" font-size="11" fill="#6E8900" font-family="'IBM Plex Mono',monospace">SSE</text>
      <rect x="60" y="198" width="100" height="42" rx="6" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
      <text x="110" y="224" text-anchor="middle" font-size="10" fill="#B2DEFF">client</text>
      <line x1="160" y1="210" x2="220" y2="210" stroke="#7FC8FF" stroke-width="1.3" marker-end="url(#t6f)"/>
      <line x1="220" y1="222" x2="160" y2="222" stroke="#E3FF8F" stroke-width="1.3" marker-end="url(#t6s)"/>
      <line x1="220" y1="234" x2="160" y2="234" stroke="#E3FF8F" stroke-width="1.3" marker-end="url(#t6s)" stroke-dasharray="4,3"/>
      <rect x="222" y="198" width="100" height="42" rx="6" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
      <text x="272" y="224" text-anchor="middle" font-size="10" fill="#B2DEFF">server</text>
      <!-- open note -->
      <rect x="334" y="206" width="120" height="26" rx="4" fill="#161F34" stroke="#6E8900" stroke-width="1"/>
      <text x="394" y="223" text-anchor="middle" font-size="9.5" fill="#E3FF8F">stays open ✓</text>

      <!-- Key difference callout -->
      <rect x="490" y="106" width="272" height="148" rx="10" fill="#0D1322" stroke="#40668D" stroke-width="1.5"/>
      <text x="626" y="134" text-anchor="middle" font-size="12.5" font-weight="400" fill="#B2DEFF">The key difference:</text>
      <text x="626" y="160" text-anchor="middle" font-size="12" fill="#B2DEFF">With HTTP, the server can only</text>
      <text x="626" y="178" text-anchor="middle" font-size="12" fill="#B2DEFF">reply once, then the call is done.</text>
      <text x="626" y="204" text-anchor="middle" font-size="12" fill="#E3FF8F">With SSE, the server can keep</text>
      <text x="626" y="222" text-anchor="middle" font-size="12" fill="#E3FF8F">pushing events as they happen.</text>
      <text x="626" y="244" text-anchor="middle" font-size="10" fill="#40668D">same underlying HTTP protocol</text>

      <text x="400" y="306" text-anchor="middle" font-size="12.5" fill="#B2DEFF">SSE is built on HTTP, so it works through firewalls and proxies</text>
      <text x="400" y="326" text-anchor="middle" font-size="12.5" fill="#B2DEFF">without any special configuration.</text>
      <text x="400" y="360" text-anchor="middle" font-size="11" fill="#40668D">SSE is the newest transport type in the MCP spec.</text>
    </svg>
  </div>

  <!-- SLIDE 7: SSE for MCP -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs>
        <marker id="t7f" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#7FC8FF"/></marker>
        <marker id="t7s" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#E3FF8F"/></marker>
      </defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="44" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">SSE for MCP</text>
      <text x="400" y="70" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">one persistent connection, reused across all tool calls in the session</text>

      <!-- Agent -->
      <rect x="60" y="118" width="200" height="130" rx="8" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.5"/>
      <text x="160" y="150" text-anchor="middle" font-size="13" fill="#7FC8FF">Agent</text>
      <text x="160" y="172" text-anchor="middle" font-size="11" fill="#B2DEFF">opens connection</text>
      <text x="160" y="192" text-anchor="middle" font-size="11" fill="#B2DEFF">on startup</text>
      <text x="160" y="218" text-anchor="middle" font-size="11" fill="#B2DEFF">reuses it for</text>
      <text x="160" y="236" text-anchor="middle" font-size="11" fill="#B2DEFF">every tool call</text>

      <!-- Persistent connection channel -->
      <rect x="296" y="138" width="208" height="90" rx="10" fill="#161F34" stroke="#6E8900" stroke-width="1.5"/>
      <text x="400" y="166" text-anchor="middle" font-size="11" fill="#E3FF8F">persistent channel</text>
      <line x1="310" y1="186" x2="490" y2="186" stroke="#7FC8FF" stroke-width="1.3" marker-end="url(#t7f)"/>
      <text x="400" y="180" text-anchor="middle" font-size="9.5" fill="#7FC8FF" font-family="'IBM Plex Mono',monospace">tool calls →</text>
      <line x1="490" y1="206" x2="310" y2="206" stroke="#E3FF8F" stroke-width="1.3" marker-end="url(#t7s)"/>
      <line x1="490" y1="218" x2="310" y2="218" stroke="#E3FF8F" stroke-width="1.3" marker-end="url(#t7s)" stroke-dasharray="4,3"/>

      <!-- MCP Server -->
      <rect x="540" y="118" width="200" height="130" rx="8" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>

  </div>

</div>
<div class="controls">
  <button class="btn" id="prev" disabled>← Prev</button>
  <div class="dots" id="dots"></div>
  <span class="slide-label" id="label">1 / 7</span>
  <button class="btn" id="next">Next →</button>
</div>
<script>
(function(){
  var slides=document.querySelectorAll('.slide'),cur=0;
  var dotsEl=document.getElementById('dots'),label=document.getElementById('label');
  var prev=document.getElementById('prev'),next=document.getElementById('next');
  slides.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.addEventListener('click',function(){goTo(i);});dotsEl.appendChild(d);});
  function goTo(n){slides[cur].classList.remove('active');dotsEl.children[cur].classList.remove('active');cur=n;slides[cur].classList.add('active');dotsEl.children[cur].classList.add('active');label.textContent=(cur+1)+' / '+slides.length;prev.disabled=cur===0;next.disabled=cur===slides.length-1;}
  prev.addEventListener('click',function(){if(cur>0)goTo(cur-1);});
  next.addEventListener('click',function(){if(cur<slides.length-1)goTo(cur+1);});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);});
})();
</script>
</body>
