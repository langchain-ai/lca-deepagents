<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #030710;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .slideshow { width: 100%; background: #030710; }
  .slide { display: none; }
  .slide.active { display: block; }
  .slide svg { width: 100%; height: auto; display: block; }
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 28px;
    background: #0D1322;
    border-top: 1px solid #161F34;
  }
  .btn {
    font: 500 12px 'IBM Plex Mono', monospace;
    padding: 7px 18px;
    border: 1px solid #40668D;
    background: transparent;
    color: #7FC8FF;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background .15s;
  }
  .btn:hover { background: #161F34; }
  .btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  .dots { display: flex; gap: 10px; align-items: center; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #2F4B68; cursor: pointer;
    transition: background .2s, transform .2s;
  }
  .dot.active { background: #7FC8FF; transform: scale(1.25); }
  .slide-label {
    font: 400 11px 'IBM Plex Mono', monospace;
    color: #40668D;
    min-width: 60px;
    text-align: right;
  }
</style>
</head>

        <rect x="450" y="244" width="290" height="28" rx="5" fill="#161F34" stroke="#6E8900" stroke-width="1"/>
        <text x="595" y="262" text-anchor="middle" font-size="10.5" fill="#E3FF8F">human sees call + inputs, decides</text>

        <line x1="595" y1="272" x2="595" y2="288" stroke="#6E8900" stroke-width="1.3" marker-end="url(#a5)"/>
        <rect x="450" y="290" width="290" height="14" rx="5" fill="#161F34" stroke="#2F4B68" stroke-width="1"/>
        <text x="595" y="301" text-anchor="middle" font-size="9.5" fill="#5BADDF">approve / edit / reject / respond</text>
      </svg>
    </div>

  </div><!-- /slides -->

  <div class="controls">
    <button class="btn" id="prev" disabled>← Prev</button>
    <div class="dots" id="dots"></div>
    <span class="slide-label" id="label">1 / 5</span>
    <button class="btn" id="next">Next →</button>
  </div>
</div>

<script>
(function () {
  var slides = document.querySelectorAll('.slide');
  var dotsEl = document.getElementById('dots');
  var label  = document.getElementById('label');
  var prev   = document.getElementById('prev');
  var next   = document.getElementById('next');
  var cur    = 0;

  slides.forEach(function (_, i) {
    var d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', function () { goTo(i); });
    dotsEl.appendChild(d);
  });

  function goTo(n) {
    slides[cur].classList.remove('active');
    dotsEl.children[cur].classList.remove('active');
    cur = n;
    slides[cur].classList.add('active');
    dotsEl.children[cur].classList.add('active');
    label.textContent = (cur + 1) + ' / ' + slides.length;
    prev.disabled = cur === 0;
    next.disabled = cur === slides.length - 1;
  }

  prev.addEventListener('click', function () { if (cur > 0) goTo(cur - 1); });
  next.addEventListener('click', function () { if (cur < slides.length - 1) goTo(cur + 1); });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowRight' && cur < slides.length - 1) goTo(cur + 1);
    if (e.key === 'ArrowLeft'  && cur > 0)                 goTo(cur - 1);
  });
})();
</script>
</body>
</html>
