<svg width="450" height="252" viewBox="0 0 450 252" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="450" height="252" fill="#030710" rx="10"/>

  <defs>
    <marker id="cmp-arr" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#7FC8FF"/>
    </marker>

    <!-- Shell / Terminal -->
    <symbol id="icon-shell" viewBox="0 0 32 26">
      <rect width="32" height="26" rx="3" fill="#1C1C1E"/>
      <circle cx="5.5" cy="5.5" r="2.5" fill="#FF5F56"/>
      <circle cx="12.5" cy="5.5" r="2.5" fill="#FFBD2E"/>
      <circle cx="19.5" cy="5.5" r="2.5" fill="#27C93F"/>
      <line x1="0" y1="10" x2="32" y2="10" stroke="#333" stroke-width="0.8"/>
      <path d="M 4 15 L 9 18 L 4 21" fill="none" stroke="#7FC8FF" stroke-width="1.5" stroke-linejoin="round"/>
      <rect x="11" y="15" width="7" height="4" rx="0.5" fill="#7FC8FF" opacity="0.75"/>
    </symbol>

    <!-- Globe / Internet -->
    <symbol id="icon-globe" viewBox="0 0 32 26">
      <circle cx="16" cy="13" r="11" fill="none" stroke="#7FC8FF" stroke-width="1.3"/>
      <ellipse cx="16" cy="13" rx="5.5" ry="11" fill="none" stroke="#7FC8FF" stroke-width="1.3"/>
      <line x1="5" y1="13" x2="27" y2="13" stroke="#7FC8FF" stroke-width="1.1"/>
      <line x1="7.5" y1="7" x2="24.5" y2="7" stroke="#7FC8FF" stroke-width="1.1"/>
      <line x1="7.5" y1="19" x2="24.5" y2="19" stroke="#7FC8FF" stroke-width="1.1"/>
    </symbol>

    <!-- Filesystem / stacked cylinders -->
    <symbol id="icon-fs" viewBox="0 0 32 26">
      <line x1="4" y1="4" x2="4" y2="13" stroke="#7FC8FF" stroke-width="1.3"/>
      <line x1="28" y1="4" x2="28" y2="13" stroke="#7FC8FF" stroke-width="1.3"/>
      <ellipse cx="16" cy="4" rx="12" ry="3.5" fill="#030710" stroke="#7FC8FF" stroke-width="1.3"/>
      <ellipse cx="16" cy="13" rx="12" ry="3.5" fill="#030710" stroke="#7FC8FF" stroke-width="1.3"/>
      <line x1="4" y1="13" x2="4" y2="22" stroke="#7FC8FF" stroke-width="1.3"/>
      <line x1="28" y1="13" x2="28" y2="22" stroke="#7FC8FF" stroke-width="1.3"/>
      <ellipse cx="16" cy="22" rx="12" ry="3.5" fill="#030710" stroke="#7FC8FF" stroke-width="1.3"/>
    </symbol>

    <!-- Display / Monitor -->
    <symbol id="icon-display" viewBox="0 0 32 26">
      <rect x="1" y="0" width="30" height="20" rx="2" fill="none" stroke="#7FC8FF" stroke-width="1.3"/>
      <rect x="3" y="2" width="26" height="16" fill="#161F34"/>
      <polygon points="8,16 14,7 20,16" fill="#2F4B68"/>
      <polygon points="15,16 20,9 26,16" fill="#40668D"/>
      <circle cx="24" cy="6" r="2.5" fill="#7FC8FF" opacity="0.85"/>
      <line x1="16" y1="20" x2="16" y2="24" stroke="#7FC8FF" stroke-width="1.3"/>
      <line x1="10" y1="24" x2="22" y2="24" stroke="#7FC8FF" stroke-width="2"/>
    </symbol>

    <!-- Gear / Tools -->
    <symbol id="icon-gear" viewBox="0 0 32 26">
      <g transform="translate(16,13)">
        <circle r="7.5" fill="none" stroke="#7FC8FF" stroke-width="1.3"/>
        <rect x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/>
        <g transform="rotate(45)"><rect  x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/></g>
        <g transform="rotate(90)"><rect  x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/></g>
        <g transform="rotate(135)"><rect x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/></g>
        <g transform="rotate(180)"><rect x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/></g>
        <g transform="rotate(225)"><rect x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/></g>
        <g transform="rotate(270)"><rect x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/></g>
        <g transform="rotate(315)"><rect x="-2" y="-12" width="4" height="4.5" rx="0.5" fill="#030710" stroke="#7FC8FF" stroke-width="1"/></g>
        <circle r="3.5" fill="#030710" stroke="#7FC8FF" stroke-width="1.2"/>
      </g>
    </symbol>

    <!-- Package / 3-D box -->
    <symbol id="icon-pkg" viewBox="0 0 32 26">
      <polygon points="4,10 22,10 22,25 4,25" fill="#030710" stroke="#7FC8FF" stroke-width="1.3"/>
      <polygon points="4,10 10,5 28,5 22,10" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.3"/>
      <polygon points="22,10 28,5 28,20 22,25" fill="#161F34" stroke="#7FC8FF" stroke-width="1.3"/>
      <line x1="14" y1="5" x2="16" y2="10" stroke="#7FC8FF" stroke-width="1" opacity="0.6"/>
      <line x1="16" y1="10" x2="18" y2="5" stroke="#7FC8FF" stroke-width="1" opacity="0.6"/>
    </symbol>
  </defs>

  <!-- Column labels -->
  <text x="115" y="27" text-anchor="middle" font-size="13" fill="#99D3FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">LocalShellBackend</text>
  <text x="335" y="27" text-anchor="middle" font-size="13" fill="#99D3FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Sandbox</text>

  <!-- ===== LEFT: LocalShellBackend ===== -->
  <!-- One big Host box containing agent + icons -->
  <rect x="20" y="40" width="190" height="192" rx="12" fill="none" stroke="#2F4B68" stroke-width="1.5"/>
  <text x="38" y="60" font-size="14" fill="#7FC8FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Host</text>

  <!-- Agent -->
  <rect x="50" y="70" width="130" height="44" rx="6" fill="#1D6FE0"/>
  <text x="115" y="97" text-anchor="middle" font-size="16" fill="#F2FAFF">Agent</text>

  <!-- execute arrow (down, within host) -->
  <line x1="115" y1="114" x2="115" y2="136" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#cmp-arr)"/>
  <text x="122" y="129" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">execute</text>

  <!-- Left icon grid: row 1 y=140, row 2 y=174 -->
  <use href="#icon-shell"   x="59"  y="140" width="32" height="26"/>
  <use href="#icon-globe"   x="99"  y="140" width="32" height="26"/>
  <use href="#icon-fs"      x="139" y="140" width="32" height="26"/>
  <use href="#icon-display" x="59"  y="174" width="32" height="26"/>
  <use href="#icon-gear"    x="99"  y="174" width="32" height="26"/>
  <use href="#icon-pkg"     x="139" y="174" width="32" height="26"/>

  <!-- ===== RIGHT: Sandbox ===== -->
  <!-- Host box (agent only) -->
  <rect x="240" y="40" width="190" height="86" rx="12" fill="none" stroke="#2F4B68" stroke-width="1.5"/>
  <text x="258" y="60" font-size="14" fill="#7FC8FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Host</text>

  <!-- Agent -->
  <rect x="270" y="70" width="130" height="44" rx="6" fill="#1D6FE0"/>
  <text x="335" y="97" text-anchor="middle" font-size="16" fill="#F2FAFF">Agent</text>

  <!-- execute arrow (down, crosses host→sandbox boundary) -->
  <line x1="335" y1="126" x2="335" y2="146" stroke="#7FC8FF" stroke-width="1.5" marker-end="url(#cmp-arr)"/>
  <text x="342" y="139" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">execute</text>

  <!-- Sandbox box (icons only) -->
  <rect x="240" y="148" width="190" height="84" rx="12" fill="none" stroke="#2F4B68" stroke-width="1.5"/>
  <text x="258" y="167" font-size="14" fill="#7FC8FF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">Sandbox</text>

  <!-- Right icon grid: row 1 y=170, row 2 y=204 -->
  <use href="#icon-shell"   x="279" y="170" width="32" height="26"/>
  <use href="#icon-globe"   x="319" y="170" width="32" height="26"/>
  <use href="#icon-fs"      x="359" y="170" width="32" height="26"/>
  <use href="#icon-display" x="279" y="204" width="32" height="26"/>
  <use href="#icon-gear"    x="319" y="204" width="32" height="26"/>
  <use href="#icon-pkg"     x="359" y="204" width="32" height="26"/>
</svg>
