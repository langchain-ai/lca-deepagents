<svg width="680" height="248" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <!-- editor window -->
  <rect x="0" y="0" width="680" height="248" rx="8" fill="#FFFFFF" stroke="#CCE9FF" stroke-width="1.5"/>
  <!-- chrome header -->
  <rect x="0" y="0" width="680" height="26" rx="8" fill="#E5F4FF"/>
  <rect x="0" y="18" width="680" height="8" fill="#E5F4FF"/>
  <!-- traffic light dots -->
  <circle cx="20" cy="13" r="4" fill="#FF5F57"/>
  <circle cx="34" cy="13" r="4" fill="#FEBC2E"/>
  <circle cx="48" cy="13" r="4" fill="#28C840"/>
  <!-- filename -->
  <text x="64" y="17" font-size="10" fill="#40668D">AGENTS.md</text>

  <!-- # Project Guidelines -->
  <text x="24" y="56" font-size="13" font-weight="600" fill="#030710"><tspan fill="#006DDD"># </tspan>Project Guidelines</text>

  <!-- ## Code Style -->
  <text x="24" y="82" font-size="12" fill="#40668D"><tspan fill="#006DDD">## </tspan>Code Style</text>
  <text x="24" y="100" font-size="11" fill="#030710"><tspan fill="#006DDD">- </tspan>All functions must have type annotations</text>
  <text x="24" y="118" font-size="11" fill="#030710"><tspan fill="#006DDD">- </tspan>Use f-strings for string formatting</text>
  <text x="24" y="136" font-size="11" fill="#030710"><tspan fill="#006DDD">- </tspan>Maximum line length is 88 characters</text>

  <!-- ## Workflow -->
  <text x="24" y="162" font-size="12" fill="#40668D"><tspan fill="#006DDD">## </tspan>Workflow</text>
  <text x="24" y="180" font-size="11" fill="#030710"><tspan fill="#006DDD">- </tspan>Run tests with: <tspan fill="#6E8900">uv run pytest</tspan></text>
  <text x="24" y="198" font-size="11" fill="#030710"><tspan fill="#006DDD">- </tspan>CI pipeline runs on every push to <tspan fill="#6E8900">main</tspan></text>
  <text x="24" y="216" font-size="11" fill="#030710"><tspan fill="#006DDD">- </tspan>Open a draft PR early so reviewers can follow along</text>
</svg>
