<svg width="900" height="360" xmlns="http://www.w3.org/2000/svg"
     font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <rect width="900" height="360" fill="#F2FAFF" rx="8"/>

  <defs>
    <marker id="arr-blue" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#006DDD"/>
    </marker>
    <marker id="arr-mid" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#40668D"/>
    </marker>
  </defs>

  <!-- ═══ CENTER DIVIDER ═══ -->
  <rect x="444" y="10" width="5" height="338" rx="2" fill="#CCE9FF"/>

  <!-- ══════════════════════════════════════════════════
       LEFT — SUMMARIZATION
       Before ctx → [Summarization / Middleware box] → After ctx
       Mirrors the layout of m3.x-summarization.svg.
  ═══════════════════════════════════════════════════ -->

  <text x="222" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#030710">Summarization</text>
  <text x="222" y="40" text-anchor="middle" font-size="11" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">acts on content already in the context window</text>

  <text x="88"  y="56" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Before</text>
  <text x="356" y="56" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">After</text>

  <!-- BEFORE context window -->
  <rect x="16" y="62" width="144" height="274" rx="6" fill="#FFFFFF" stroke="#CCE9FF" stroke-width="1.5"/>
  <text x="88" y="80" text-anchor="middle" font-size="9" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">CONTEXT WINDOW</text>

  <!-- Recent (light) — gray stubs -->
  <rect x="26" y="86"  width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="34" y="95"  width="82"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="34" y="103" width="56"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="26" y="116" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="34" y="125" width="70"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="34" y="133" width="50"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="26" y="146" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="34" y="155" width="90"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="34" y="163" width="62"  height="3"  rx="1" fill="#B2DEFF"/>

  <!-- Keep cutoff -->
  <text x="88" y="184" text-anchor="middle" font-size="9" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">keep cutoff</text>
  <line x1="16" y1="191" x2="160" y2="191" stroke="#40668D" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Old (dark) — gray stubs -->
  <rect x="26" y="198" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="207" width="78"  height="3"  rx="1" fill="#2F4B68"/>
  <rect x="34" y="215" width="54"  height="3"  rx="1" fill="#2F4B68"/>

  <rect x="26" y="228" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="237" width="86"  height="3"  rx="1" fill="#2F4B68"/>
  <rect x="34" y="245" width="58"  height="3"  rx="1" fill="#2F4B68"/>

  <rect x="26" y="258" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="267" width="72"  height="3"  rx="1" fill="#2F4B68"/>
  <rect x="34" y="275" width="50"  height="3"  rx="1" fill="#2F4B68"/>

  <rect x="26" y="288" width="124" height="26" rx="3" fill="#0D1322" stroke="#40668D" stroke-width="1"/>
  <rect x="34" y="298" width="80"  height="3"  rx="1" fill="#2F4B68"/>

  <!-- Arrows: Before → middleware box → After -->
  <line x1="160" y1="198" x2="169" y2="198" stroke="#006DDD" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="279" y1="198" x2="288" y2="198" stroke="#006DDD" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Summarization / Middleware blue box -->
  <rect x="172" y="172" width="106" height="52" rx="4" fill="#006DDD"/>
  <text x="225" y="194" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Summarization</text>
  <line x1="180" y1="201" x2="270" y2="201" stroke="#99D3FF" stroke-width="1"/>
  <text x="225" y="216" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Middleware</text>

  <!-- AFTER context window -->
  <rect x="292" y="62" width="144" height="274" rx="6" fill="#FFFFFF" stroke="#CCE9FF" stroke-width="1.5"/>
  <text x="364" y="80" text-anchor="middle" font-size="9" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">CONTEXT WINDOW</text>

  <!-- Recent (kept — same stubs as Before) -->
  <rect x="302" y="86"  width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="310" y="95"  width="82"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="310" y="103" width="56"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="302" y="116" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="310" y="125" width="70"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="310" y="133" width="50"  height="3"  rx="1" fill="#B2DEFF"/>

  <rect x="302" y="146" width="124" height="26" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <rect x="310" y="155" width="90"  height="3"  rx="1" fill="#B2DEFF"/>
  <rect x="310" y="163" width="62"  height="3"  rx="1" fill="#B2DEFF"/>

  <!-- Keep cutoff (After) -->
  <text x="364" y="184" text-anchor="middle" font-size="9" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">keep cutoff</text>
  <line x1="292" y1="191" x2="436" y2="191" stroke="#40668D" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Σ Summary block (replaces old messages) -->
  <rect x="302" y="198" width="124" height="30" rx="4" fill="#CCE9FF" stroke="#006DDD" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="364" y="218" text-anchor="middle" font-size="13" font-weight="700" fill="#006DDD">&#x2211; Summary</text>


  <!-- ══════════════════════════════════════════════════
       RIGHT — OFFLOADING
       Inputs → [Filesystem / Middleware box] → Context Window
                           ↓ Filesystem
  ═══════════════════════════════════════════════════ -->

  <text x="672" y="22" text-anchor="middle" font-size="16" font-weight="700" fill="#030710">Offloading</text>
  <text x="672" y="40" text-anchor="middle" font-size="11" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">intercepts inputs before they enter context</text>

  <!-- Input 1: Tool Result (shrunk) -->
  <rect x="452" y="76" width="100" height="44" rx="4" fill="#E5F4FF" stroke="#40668D" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="502" y="95"  text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Tool Result</text>
  <text x="502" y="111" text-anchor="middle" font-size="12" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">(large)</text>

  <!-- Input 2: Human / Message (shrunk, two lines) -->
  <rect x="452" y="140" width="100" height="44" rx="4" fill="#E5F4FF" stroke="#40668D" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="502" y="158" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Human</text>
  <text x="502" y="174" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Message</text>

  <!-- Arrows: inputs → FilesystemMiddleware -->
  <line x1="552" y1="98"  x2="562" y2="118" stroke="#40668D" stroke-width="1.5" marker-end="url(#arr-mid)"/>
  <line x1="552" y1="162" x2="562" y2="152" stroke="#40668D" stroke-width="1.5" marker-end="url(#arr-mid)"/>

  <!-- Filesystem / Middleware blue box (two-line, narrower) -->
  <rect x="566" y="102" width="110" height="52" rx="4" fill="#006DDD"/>
  <text x="621" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Filesystem</text>
  <line x1="574" y1="131" x2="668" y2="131" stroke="#99D3FF" stroke-width="1"/>
  <text x="621" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">Middleware</text>

  <!-- Arrow: FilesystemMiddleware → Context Window (horizontal, primary flow) -->
  <line x1="676" y1="128" x2="694" y2="128" stroke="#006DDD" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Context Window (wider now that inputs are smaller) -->
  <rect x="698" y="76" width="184" height="124" rx="5" fill="#FFFFFF" stroke="#CCE9FF" stroke-width="1.5"/>
  <text x="790" y="93" text-anchor="middle" font-size="9" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">CONTEXT WINDOW</text>
  <!-- Preview block -->
  <rect x="708" y="99" width="164" height="75" rx="3" fill="#E5F4FF" stroke="#006DDD" stroke-width="1"/>
  <text x="790" y="116" text-anchor="middle" font-size="12" font-weight="600" fill="#030710">Preview</text>
  <line x1="716" y1="122" x2="864" y2="122" stroke="#CCE9FF" stroke-width="1"/>
  <text x="790" y="136" text-anchor="middle" font-size="12" fill="#030710">row 1 | Alice...</text>
  <text x="790" y="150" text-anchor="middle" font-size="12" fill="#40668D">...</text>
  <text x="790" y="165" text-anchor="middle" font-size="12" fill="#006DDD"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">&#x2192; /path/…</text>

  <!-- Arrow: FilesystemMiddleware → Filesystem (secondary, downward) -->
  <line x1="621" y1="154" x2="621" y2="196" stroke="#40668D" stroke-width="1.5" marker-end="url(#arr-mid)"/>

  <!-- Filesystem box -->
  <rect x="557" y="200" width="128" height="118" rx="4" fill="#FFFFFF" stroke="#40668D" stroke-width="1.5"/>
  <text x="621" y="220" text-anchor="middle" font-size="12" fill="#40668D" letter-spacing="0.5"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">FILESYSTEM</text>
  <line x1="565" y1="228" x2="677" y2="228" stroke="#E5F4FF" stroke-width="1"/>
  <text x="621" y="247" text-anchor="middle" font-size="12" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">/tool_results/</text>
  <text x="621" y="264" text-anchor="middle" font-size="12" fill="#40668D"
        font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace">/conv_history/</text>
  <text x="621" y="284" text-anchor="middle" font-size="12" fill="#030710">full · lossless</text>
  <text x="621" y="301" text-anchor="middle" font-size="12" fill="#6E8900">read_file to retrieve</text>

</svg>
