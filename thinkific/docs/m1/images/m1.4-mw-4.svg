<svg width="740" height="430" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="mw4-arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#7FC8FF"/></marker>
  </defs>
  <rect width="740" height="430" fill="#030710" rx="8"/>
  <text x="370" y="40" text-anchor="middle" font-size="15" font-weight="300" fill="#F2FAFF">…and that changes the final answer</text>

  <!-- user question pill -->
  <rect x="220" y="56" width="300" height="40" rx="20" fill="#161F34" stroke="#7FC8FF" stroke-width="1.2"/>
  <text x="370" y="81" text-anchor="middle" font-size="11" fill="#F2FAFF">User: "Summarize notes.txt for me."</text>

  <line x1="300" y1="98" x2="200" y2="128" stroke="#40668D" stroke-width="1.3" marker-end="url(#mw4-arr)"/>
  <line x1="440" y1="98" x2="540" y2="128" stroke="#40668D" stroke-width="1.3" marker-end="url(#mw4-arr)"/>

  <!-- WITHOUT column -->
  <rect x="40" y="132" width="320" height="252" rx="6" fill="#0D1322" stroke="#FBB0A5" stroke-width="1.6"/>
  <text x="200" y="156" text-anchor="middle" font-size="11" font-weight="400" fill="#FBB0A5">WITHOUT the middleware</text>
  <text x="200" y="174" text-anchor="middle" font-size="8.5" fill="#40668D" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">a bare model, no file tools</text>

  <rect x="62" y="190" width="276" height="40" rx="6" fill="#161F34" stroke="#634643" stroke-width="1"/>
  <text x="200" y="214" text-anchor="middle" font-size="9" fill="#FBB0A5" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">no read_file tool available</text>

  <rect x="62" y="246" width="276" height="116" rx="8" fill="#1E3A5F" stroke="#634643" stroke-width="1.2"/>
  <text x="200" y="270" text-anchor="middle" font-size="9.5" font-weight="400" fill="#FBB0A5">Answer</text>
  <text x="200" y="296" text-anchor="middle" font-size="9.5" fill="#B27D75">"I don't have access to your</text>
  <text x="200" y="312" text-anchor="middle" font-size="9.5" fill="#B27D75">files, so I can't read</text>
  <text x="200" y="328" text-anchor="middle" font-size="9.5" fill="#B27D75">notes.txt."</text>

  <!-- WITH column -->
  <rect x="380" y="132" width="320" height="252" rx="6" fill="#0D1322" stroke="#6E8900" stroke-width="1.6"/>
  <text x="540" y="156" text-anchor="middle" font-size="11" font-weight="400" fill="#E3FF8F">WITH FilesystemMiddleware</text>
  <text x="540" y="174" text-anchor="middle" font-size="8.5" fill="#40668D" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">file tools + instructions injected</text>

  <rect x="402" y="190" width="276" height="40" rx="6" fill="#161F34" stroke="#6E8900" stroke-width="1"/>
  <text x="540" y="208" text-anchor="middle" font-size="9" fill="#E3FF8F" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">calls read_file("notes.txt")</text>
  <text x="540" y="222" text-anchor="middle" font-size="8" fill="#B2DEFF" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">→ reads the file contents</text>

  <rect x="402" y="246" width="276" height="116" rx="8" fill="#1E3A5F" stroke="#6E8900" stroke-width="1.2"/>
  <text x="540" y="270" text-anchor="middle" font-size="9.5" font-weight="400" fill="#E3FF8F">Answer</text>
  <text x="540" y="296" text-anchor="middle" font-size="9.5" fill="#B2DEFF">"Your notes cover three topics:</text>
  <text x="540" y="312" text-anchor="middle" font-size="9.5" fill="#B2DEFF">the migration plan, open</text>
  <text x="540" y="328" text-anchor="middle" font-size="9.5" fill="#B2DEFF">questions, and next steps."</text>
</svg>
