<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #030710; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  .slide { display: none; }
  .slide.active { display: block; }
  .slide svg { width: 100%; height: auto; display: block; }
  .controls { display: flex; align-items: center; justify-content: space-between; padding: 13px 28px; background: #0D1322; border-top: 1px solid #161F34; }
  .btn { font: 500 12px 'IBM Plex Mono', monospace; padding: 7px 18px; border: 1px solid #40668D; background: transparent; color: #7FC8FF; border-radius: 6px; cursor: pointer; transition: background .15s; }
  .btn:hover { background: #161F34; }
  .btn:disabled { opacity: 0.25; cursor: default; pointer-events: none; }
  .dots { display: flex; gap: 10px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #2F4B68; cursor: pointer; transition: background .2s, transform .2s; }
  .dot.active { background: #7FC8FF; transform: scale(1.25); }
  .slide-label { font: 400 11px 'IBM Plex Mono', monospace; color: #40668D; min-width: 40px; text-align: right; }
</style>
</head>
<body>
<div id="slides">

  <!-- SLIDE 1: Why auth? -->
  <div class="slide active">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs><marker id="a1x" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#FBB0A5"/></marker></defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="48" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">Why some servers require authorization</text>
      <text x="400" y="74" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">not every MCP server is open; some protect private data</text>

      <!-- Agent -->
      <rect x="80" y="140" width="160" height="100" rx="8" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.5"/>
      <text x="160" y="186" text-anchor="middle" font-size="13" fill="#7FC8FF">Agent</text>
      <text x="160" y="206" text-anchor="middle" font-size="10" fill="#B2DEFF">wants to read email</text>

      <!-- Blocked arrow -->
      <line x1="240" y1="190" x2="358" y2="190" stroke="#FBB0A5" stroke-width="1.5" marker-end="url(#a1x)"/>
      <text x="299" y="180" text-anchor="middle" font-size="11" fill="#FBB0A5">blocked</text>
      <text x="299" y="205" text-anchor="middle" font-size="9.5" fill="#634643" font-family="'IBM Plex Mono',monospace">without valid token</text>

      <!-- Locked server -->
      <rect x="360" y="130" width="200" height="120" rx="8" fill="#0D1322" stroke="#C78EAD" stroke-width="2"/>
      <text x="460" y="164" text-anchor="middle" font-size="13" fill="#C78EAD">Gmail MCP Server</text>
      <!-- Lock icon -->
      <rect x="435" y="178" width="50" height="40" rx="5" fill="#161F34" stroke="#C78EAD" stroke-width="1.5"/>
      <path d="M445,178 Q460,162 475,178" fill="none" stroke="#C78EAD" stroke-width="1.5"/>
      <circle cx="460" cy="198" r="4" fill="#C78EAD"/>
      <text x="460" y="236" text-anchor="middle" font-size="10" fill="#EBD0F0">requires OAuth token</text>

      <!-- What's protected -->
      <rect x="590" y="140" width="154" height="100" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="1"/>
      <text x="667" y="168" text-anchor="middle" font-size="11" fill="#B2DEFF">Your emails</text>
      <text x="667" y="186" text-anchor="middle" font-size="11" fill="#B2DEFF">contacts</text>
      <text x="667" y="204" text-anchor="middle" font-size="11" fill="#B2DEFF">calendar</text>
      <text x="667" y="226" text-anchor="middle" font-size="9" fill="#40668D" font-family="'IBM Plex Mono',monospace">private data</text>

      <text x="400" y="306" text-anchor="middle" font-size="12.5" fill="#B2DEFF">The MCP server verifies the caller has permission</text>
      <text x="400" y="326" text-anchor="middle" font-size="12.5" fill="#B2DEFF">before it exposes any tools or returns any data.</text>
      <text x="400" y="360" text-anchor="middle" font-size="11" fill="#40668D">OAuth is the standard used for services like Gmail, GitHub, and Slack.</text>
    </svg>
  </div>

  <!-- SLIDE 2: Declaring OAuth in .mcp.json -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="48" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">Declaring auth in .mcp.json</text>
      <text x="400" y="74" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">two fields: auth type and which tools the agent can see</text>

      <!-- Editor -->
      <rect x="110" y="94" width="440" height="228" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="1.5"/>
      <rect x="110" y="94" width="440" height="28" rx="8" fill="#161F34"/>
      <rect x="110" y="110" width="440" height="12" fill="#161F34"/>
      <circle cx="128" cy="108" r="5" fill="#441E33"/>
      <circle cx="145" cy="108" r="5" fill="#634643"/>
      <circle cx="162" cy="108" r="5" fill="#2E3900"/>
      <text x="178" y="112" font-size="10" fill="#40668D" font-family="'IBM Plex Mono',monospace">.mcp.json</text>

      <g font-family="'IBM Plex Mono',monospace" font-size="13">
        <text x="136" y="150" fill="#B2DEFF">"gmail": {</text>
        <text x="136" y="173" fill="#B2DEFF">  "type": <tspan fill="#E3FF8F">"sse"</tspan>,</text>
        <text x="136" y="194" fill="#B2DEFF">  "url":  <tspan fill="#E3FF8F">"https://..."</tspan>,</text>
        <!-- auth highlight -->
        <rect x="124" y="202" width="410" height="22" rx="3" fill="#1A2E1A" stroke="#6E8900" stroke-width="1"/>
        <text x="136" y="218" fill="#B2DEFF">  "auth": <tspan fill="#E3FF8F">"oauth"</tspan>,</text>
        <!-- allowedTools highlight -->
        <rect x="124" y="224" width="410" height="22" rx="3" fill="#1A2938" stroke="#7FC8FF" stroke-width="1"/>
        <text x="136" y="240" fill="#B2DEFF">  "allowedTools": <tspan fill="#E3FF8F">["list_emails","read_email"]</tspan></text>
        <text x="136" y="262" fill="#B2DEFF">}</text>
      </g>

      <!-- Annotations -->
      <rect x="574" y="200" width="126" height="30" rx="5" fill="#0D1322" stroke="#6E8900" stroke-width="1.2"/>
      <line x1="534" y1="213" x2="572" y2="213" stroke="#6E8900" stroke-width="1"/>
      <text x="637" y="219" text-anchor="middle" font-size="10" fill="#E3FF8F">triggers OAuth flow</text>

      <rect x="574" y="238" width="126" height="44" rx="5" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.2"/>
      <line x1="534" y1="235" x2="572" y2="248" stroke="#7FC8FF" stroke-width="1"/>
      <text x="637" y="255" text-anchor="middle" font-size="10" fill="#B2DEFF">agent only sees</text>
      <text x="637" y="270" text-anchor="middle" font-size="10" fill="#B2DEFF">these two tools</text>

      <text x="400" y="360" text-anchor="middle" font-size="11.5" fill="#40668D">allowedTools limits exposure; the server may have many more tools but only these are loaded.</text>
    </svg>
  </div>

  <!-- SLIDE 3: First run — browser opens -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs><marker id="a3fwd" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#C78EAD"/></marker></defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="48" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">First run: OAuth login</text>
      <text x="400" y="74" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">deepagents handles the OAuth flow automatically</text>

      <!-- Step boxes -->
      <!-- Step 1 -->
      <rect x="36" y="108" width="162" height="160" rx="8" fill="#0D1322" stroke="#C78EAD" stroke-width="1.5"/>
      <text x="117" y="134" text-anchor="middle" font-size="10" fill="#C78EAD" font-family="'IBM Plex Mono',monospace">STEP 1</text>
      <text x="117" y="158" text-anchor="middle" font-size="12" fill="#EBD0F0">deepagents</text>
      <text x="117" y="176" text-anchor="middle" font-size="12" fill="#EBD0F0">detects</text>
      <text x="117" y="196" text-anchor="middle" font-size="11" fill="#EBD0F0">"auth": "oauth"</text>
      <text x="117" y="216" text-anchor="middle" font-size="11" fill="#EBD0F0">in the config</text>

      <line x1="198" y1="188" x2="234" y2="188" stroke="#C78EAD" stroke-width="1.5" marker-end="url(#a3fwd)"/>

      <!-- Step 2 -->
      <rect x="236" y="108" width="162" height="160" rx="8" fill="#0D1322" stroke="#C78EAD" stroke-width="1.5"/>
      <text x="317" y="134" text-anchor="middle" font-size="10" fill="#C78EAD" font-family="'IBM Plex Mono',monospace">STEP 2</text>
      <text x="317" y="158" text-anchor="middle" font-size="12" fill="#EBD0F0">browser</text>
      <text x="317" y="176" text-anchor="middle" font-size="12" fill="#EBD0F0">opens with</text>
      <text x="317" y="196" text-anchor="middle" font-size="11" fill="#EBD0F0">provider's login</text>
      <text x="317" y="215" text-anchor="middle" font-size="11" fill="#EBD0F0">page</text>

      <line x1="398" y1="188" x2="434" y2="188" stroke="#C78EAD" stroke-width="1.5" marker-end="url(#a3fwd)"/>

      <!-- Step 3 -->
      <rect x="436" y="108" width="162" height="160" rx="8" fill="#0D1322" stroke="#C78EAD" stroke-width="1.5"/>
      <text x="517" y="134" text-anchor="middle" font-size="10" fill="#C78EAD" font-family="'IBM Plex Mono',monospace">STEP 3</text>
      <text x="517" y="158" text-anchor="middle" font-size="12" fill="#EBD0F0">you log in</text>
      <text x="517" y="178" text-anchor="middle" font-size="12" fill="#EBD0F0">and grant</text>
      <text x="517" y="198" text-anchor="middle" font-size="12" fill="#EBD0F0">permission</text>

      <line x1="598" y1="188" x2="634" y2="188" stroke="#C78EAD" stroke-width="1.5" marker-end="url(#a3fwd)"/>

      <!-- Step 4 -->
      <rect x="636" y="108" width="128" height="160" rx="8" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
      <text x="700" y="134" text-anchor="middle" font-size="10" fill="#6E8900" font-family="'IBM Plex Mono',monospace">DONE</text>
      <text x="700" y="158" text-anchor="middle" font-size="12" fill="#E3FF8F">token</text>
      <text x="700" y="178" text-anchor="middle" font-size="12" fill="#E3FF8F">saved to</text>
      <text x="700" y="200" text-anchor="middle" font-size="9.5" fill="#B2DEFF" font-family="'IBM Plex Mono',monospace">~/.deepagents/</text>
      <text x="700" y="218" text-anchor="middle" font-size="9.5" fill="#B2DEFF" font-family="'IBM Plex Mono',monospace">.state/mcp-tokens/</text>
      <text x="700" y="248" text-anchor="middle" font-size="9" fill="#6E8900" font-family="'IBM Plex Mono',monospace">gmail.json</text>

      <text x="400" y="318" text-anchor="middle" font-size="12.5" fill="#B2DEFF">This happens once. On the next run, deepagents finds the saved token</text>
      <text x="400" y="338" text-anchor="middle" font-size="12.5" fill="#B2DEFF">and connects without opening the browser again.</text>
    </svg>
  </div>

  <!-- SLIDE 4: HITL — what and why -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="48" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">Human-in-the-loop (HITL)</text>
      <text x="400" y="74" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">gate a tool call behind a human yes/no before it executes</text>

      <!-- Why section -->
      <rect x="50" y="100" width="320" height="190" rx="10" fill="#0D1322" stroke="#40668D" stroke-width="1.5"/>
      <text x="210" y="130" text-anchor="middle" font-size="13" font-weight="400" fill="#B2DEFF">Why use HITL?</text>
      <text x="210" y="158" text-anchor="middle" font-size="11.5" fill="#B2DEFF">Auth proves you are allowed to access</text>
      <text x="210" y="176" text-anchor="middle" font-size="11.5" fill="#B2DEFF">a service. It does not prevent the agent</text>
      <text x="210" y="194" text-anchor="middle" font-size="11.5" fill="#B2DEFF">from making calls you did not expect.</text>
      <text x="210" y="222" text-anchor="middle" font-size="11.5" fill="#E3FF8F">HITL lets you review each call</text>
      <text x="210" y="240" text-anchor="middle" font-size="11.5" fill="#E3FF8F">before it actually runs.</text>
      <text x="210" y="268" text-anchor="middle" font-size="10" fill="#40668D">useful for email, file writes, external APIs</text>

      <!-- How section -->
      <rect x="430" y="100" width="320" height="190" rx="10" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
      <text x="590" y="130" text-anchor="middle" font-size="13" font-weight="400" fill="#E3FF8F">How to enable it</text>
      <text x="590" y="158" text-anchor="middle" font-size="11" fill="#B2DEFF">Pass interrupt_on to create_deep_agent</text>
      <text x="590" y="178" text-anchor="middle" font-size="11" fill="#B2DEFF">with a dict mapping tool names to True.</text>
      <rect x="448" y="196" width="284" height="50" rx="5" fill="#161F34" stroke="#2F4B68" stroke-width="1"/>
      <text x="590" y="215" text-anchor="middle" font-size="10.5" fill="#E3FF8F" font-family="'IBM Plex Mono',monospace">interrupt_on={</text>
      <text x="590" y="233" text-anchor="middle" font-size="10.5" fill="#E3FF8F" font-family="'IBM Plex Mono',monospace">  "read_email": True</text>
      <text x="590" y="274" text-anchor="middle" font-size="10" fill="#40668D">requires a checkpointer to pause/resume</text>

      <text x="400" y="334" text-anchor="middle" font-size="12.5" fill="#B2DEFF">OAuth and HITL serve different purposes. You will often use both:</text>
      <text x="400" y="354" text-anchor="middle" font-size="12.5" fill="#B2DEFF">OAuth to authenticate, HITL to approve each individual call.</text>
    </svg>
  </div>

  <!-- SLIDE 5: HITL flow step by step -->
  <div class="slide">
    <svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
      <defs><marker id="a5fwd" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto"><path d="M0,0 L5,3 L0,6 Z" fill="#6E8900"/></marker></defs>
      <rect width="800" height="380" fill="#030710"/>
      <text x="400" y="48" text-anchor="middle" font-size="21" font-weight="300" fill="#F2FAFF">The HITL flow</text>
      <text x="400" y="74" text-anchor="middle" font-size="12" fill="#99D3FF" font-family="'IBM Plex Mono',monospace">agent pauses; human decides; agent resumes</text>

      <!-- Step 1 -->
      <rect x="30" y="106" width="138" height="148" rx="8" fill="#0D1322" stroke="#40668D" stroke-width="1.5"/>
      <text x="99" y="130" text-anchor="middle" font-size="9.5" fill="#40668D" font-family="'IBM Plex Mono',monospace">STEP 1</text>
      <text x="99" y="156" text-anchor="middle" font-size="12" fill="#B2DEFF">agent decides</text>
      <text x="99" y="174" text-anchor="middle" font-size="12" fill="#B2DEFF">to call</text>
      <text x="99" y="194" text-anchor="middle" font-size="11" fill="#CCE9FF" font-family="'IBM Plex Mono',monospace">read_email</text>
      <text x="99" y="222" text-anchor="middle" font-size="10" fill="#40668D">interrupt_on</text>
      <text x="99" y="238" text-anchor="middle" font-size="10" fill="#40668D">is active</text>

      <line x1="168" y1="180" x2="198" y2="180" stroke="#6E8900" stroke-width="1.4" marker-end="url(#a5fwd)"/>

      <!-- Step 2 -->
      <rect x="200" y="106" width="138" height="148" rx="8" fill="#0D1322" stroke="#C78EAD" stroke-width="1.5"/>
      <text x="269" y="130" text-anchor="middle" font-size="9.5" fill="#C78EAD" font-family="'IBM Plex Mono',monospace">STEP 2</text>
      <text x="269" y="156" text-anchor="middle" font-size="12" fill="#EBD0F0">graph pauses</text>
      <text x="269" y="176" text-anchor="middle" font-size="12" fill="#EBD0F0">tool call is</text>
      <text x="269" y="196" text-anchor="middle" font-size="12" fill="#EBD0F0">held pending</text>
      <text x="269" y="222" text-anchor="middle" font-size="10" fill="#40668D">state is saved</text>
      <text x="269" y="238" text-anchor="middle" font-size="10" fill="#40668D">to checkpointer</text>

      <line x1="338" y1="180" x2="368" y2="180" stroke="#6E8900" stroke-width="1.4" marker-end="url(#a5fwd)"/>

      <!-- Step 3 -->
      <rect x="370" y="106" width="138" height="148" rx="8" fill="#0D1322" stroke="#7FC8FF" stroke-width="1.5"/>
      <text x="439" y="130" text-anchor="middle" font-size="9.5" fill="#7FC8FF" font-family="'IBM Plex Mono',monospace">STEP 3</text>
      <text x="439" y="156" text-anchor="middle" font-size="12" fill="#F2FAFF">you see the</text>
      <text x="439" y="176" text-anchor="middle" font-size="12" fill="#F2FAFF">pending call</text>
      <text x="439" y="196" text-anchor="middle" font-size="11" fill="#B2DEFF">name + inputs</text>
      <text x="439" y="222" text-anchor="middle" font-size="10" fill="#40668D">approve / edit</text>
      <text x="439" y="238" text-anchor="middle" font-size="10" fill="#40668D">reject / respond</text>

      <line x1="508" y1="180" x2="538" y2="180" stroke="#6E8900" stroke-width="1.4" marker-end="url(#a5fwd)"/>

      <!-- Step 4 -->
      <rect x="540" y="106" width="230" height="148" rx="8" fill="#0D1322" stroke="#6E8900" stroke-width="1.5"/>
      <text x="655" y="130" text-anchor="middle" font-size="9.5" fill="#6E8900" font-family="'IBM Plex Mono',monospace">STEP 4</text>
      <text x="655" y="154" text-anchor="middle" font-size="12" fill="#E3FF8F">agent resumes</text>
      <text x="655" y="174" text-anchor="middle" font-size="11" fill="#B2DEFF">if approved: tool runs,</text>
      <text x="655" y="192" text-anchor="middle" font-size="11" fill="#B2DEFF">result added to history</text>
      <text x="655" y="212" text-anchor="middle" font-size="11" fill="#B2DEFF">if rejected: tool skipped,</text>
      <text x="655" y="230" text-anchor="middle" font-size="11" fill="#B2DEFF">model gets rejection note</text>
      <text x="655" y="248" text-anchor="middle" font-size="9.5" fill="#40668D" font-family="'IBM Plex Mono',monospace">Command(resume=...)</text>

      <text x="400" y="310" text-anchor="middle" font-size="12.5" fill="#B2DEFF">From the model's point of view, a rejected tool call looks like</text>
      <text x="400" y="330" text-anchor="middle" font-size="12.5" fill="#B2DEFF">any other tool message; it just does not contain a result.</text>
      <text x="400" y="362" text-anchor="middle" font-size="11" fill="#40668D">The agent can then decide to try a different approach or ask the user for clarification.</text>
    </svg>
  </div>

</div>
<div class="controls">
  <button class="btn" id="prev" disabled>← Prev</button>
  <div class="dots" id="dots"></div>
  <span class="slide-label" id="label">1 / 5</span>
  <button class="btn" id="next">Next →</button>
</div>
<script>
(function(){
  var slides=document.querySelectorAll('.slide'),cur=0;
  var dotsEl=document.getElementById('dots'),label=document.getElementById('label');
  var prev=document.getElementById('prev'),next=document.getElementById('next');
  slides.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.addEventListener('click',function(){goTo(i);});dotsEl.appendChild(d);});
  function goTo(n){slides[cur].classList.remove('active');dotsEl.children[cur].classList.remove('active');cur=n;slides[cur].classList.add('active');dotsEl.children[cur].classList.add('active');label.textContent=(cur+1)+' / '+slides.length;prev.disabled=cur===0;next.disabled=cur===slides.length-1;}
  prev.addEventListener('click',function(){if(cur>0)goTo(cur-1);});
  next.addEventListener('click',function(){if(cur<slides.length-1)goTo(cur+1);});
  document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'&&cur<slides.length-1)goTo(cur+1);if(e.key==='ArrowLeft'&&cur>0)goTo(cur-1);});
})();
</script>
</body>
</html>
