<svg width="680" height="248" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <!-- editor window -->
  <rect x="0" y="0" width="680" height="248" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="1.5"/>
  <!-- chrome header -->
  <rect x="0" y="0" width="680" height="26" rx="8" fill="#1E3A5F"/>
  <rect x="0" y="18" width="680" height="8" fill="#1E3A5F"/>
  <!-- traffic light dots -->
  <circle cx="20" cy="13" r="4" fill="#441E33"/>
  <circle cx="34" cy="13" r="4" fill="#634643"/>
  <circle cx="48" cy="13" r="4" fill="#2E3900"/>
  <!-- filename -->
  <text x="64" y="17" font-size="10" fill="#99D3FF">AGENTS.md</text>

  <!-- # Project Guidelines -->
  <text x="24" y="56" font-size="13" font-weight="600" fill="#F2FAFF"><tspan fill="#40668D"># </tspan>Project Guidelines</text>

  <!-- ## Code Style -->
  <text x="24" y="82" font-size="12" fill="#99D3FF"><tspan fill="#40668D">## </tspan>Code Style</text>
  <text x="24" y="100" font-size="11" fill="#CCE9FF"><tspan fill="#40668D">- </tspan>All functions must have type annotations</text>
  <text x="24" y="118" font-size="11" fill="#CCE9FF"><tspan fill="#40668D">- </tspan>Use f-strings for string formatting</text>
  <text x="24" y="136" font-size="11" fill="#CCE9FF"><tspan fill="#40668D">- </tspan>Maximum line length is 88 characters</text>

  <!-- ## Workflow -->
  <text x="24" y="162" font-size="12" fill="#99D3FF"><tspan fill="#40668D">## </tspan>Workflow</text>
  <text x="24" y="180" font-size="11" fill="#CCE9FF"><tspan fill="#40668D">- </tspan>Run tests with: <tspan fill="#E3FF8F">uv run pytest</tspan></text>
  <text x="24" y="198" font-size="11" fill="#CCE9FF"><tspan fill="#40668D">- </tspan>CI pipeline runs on every push to <tspan fill="#E3FF8F">main</tspan></text>
  <text x="24" y="216" font-size="11" fill="#CCE9FF"><tspan fill="#40668D">- </tspan>Open a draft PR early so reviewers can follow along</text>
</svg>
